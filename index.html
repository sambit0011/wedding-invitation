<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sambit &amp; Akanksha — Wedding Invitation</title>
<style>

/* ── Reset ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html,body {
  width: 100%; height: 100%;
  background: #fdf6ee; /* Warm soft peach/cream backdrop */
  display: flex;
  justify-content: center;
  overflow: hidden;
}

/* Phone shell */
#app {
  position: relative;
  width: 100vw;
  max-width: 430px;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: #fcefe3; /* Peach cream mobile frame */
}

/* ================================================================
   PARTICLES CANVAS (behind everything)
================================================================ */
#particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity .3s;
}
#particles.show { opacity: 1; }

/* ================================================================
   ENVELOPE SCREEN
================================================================ */
#env {
  position: absolute;
  inset: 0;
  background: #fcefe3; /* Seamless peach envelope fallback */
  z-index: 200;
  overflow: hidden;
  perspective: 1000px; /* Enable 3D transitions */
}

#env-lower {
  position: absolute;
  inset: 0;
  background: url('assets/envelope_start.jpg?v=3') no-repeat center center;
  background-size: cover;
  clip-path: polygon(0% 58%, 50% 73.5%, 100% 58%, 100% 100%, 0% 100%);
  z-index: 1;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: auto;
}

#env-upper {
  position: absolute;
  inset: 0;
  background: url('assets/envelope_start.jpg?v=3') no-repeat center center;
  background-size: cover;
  clip-path: polygon(0% 0%, 100% 0%, 100% 58%, 50% 73.5%, 0% 58%);
  z-index: 2;
  transform-origin: top center; /* Hinge from top edge for 3D leaflet flip */
  transition: transform 3.0s cubic-bezier(0.25, 1, 0.5, 1);
  image-rendering: -webkit-optimize-contrast;
  image-rendering: auto;
}

/* Upper leaflet flap folds upwards cleanly in 3D (partially opened to exactly 50%) */
#env-upper.open {
  transform: rotateX(115deg); /* Folds the top section UPWARDS in 3D! */
}

/* Peach mask to hide printed Ganesha wax coin on lower body instantly upon opening */
#seal-mask {
  position: absolute;
  top: 73.5%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #fcefe3; /* Matches peach card interior */
  z-index: 1.5;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
#seal-mask.show {
  opacity: 1;
}

/* Premium gold breathing glow click target exactly aligned with Ganesha wax seal */
.seal {
  position: absolute;
  top: 73.5%; /* Aligned with Ganesha wax seal in the new peach starting envelope */
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 10;
  -webkit-user-select: none;
  user-select: none;
  
  /* Bright, premium gold glowing border and box shadow */
  border: 2px solid rgba(212, 175, 55, 0.95);
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.8),
              inset 0 0 10px rgba(212, 175, 55, 0.4);
  animation: sealGlowPulse 2.0s infinite ease-in-out;
}
@keyframes sealGlowPulse {
  0% {
    box-shadow: 0 0 8px rgba(212, 175, 55, 0.6), 
                inset 0 0 5px rgba(212, 175, 55, 0.3);
    transform: translate(-50%, -50%) scale(1);
  }
  50% {
    box-shadow: 0 0 30px rgba(212, 175, 55, 1), 
                0 0 45px rgba(212, 175, 55, 0.7),
                inset 0 0 15px rgba(212, 175, 55, 0.6);
    transform: translate(-50%, -50%) scale(1.06); /* Rhythmic breathing scale */
  }
  100% {
    box-shadow: 0 0 8px rgba(212, 175, 55, 0.6), 
                inset 0 0 5px rgba(212, 175, 55, 0.3);
    transform: translate(-50%, -50%) scale(1);
  }
}

/* Seal click spinning effect */
.seal.spinning {
  animation: sealSpin 0.5s ease-in-out forwards;
}
@keyframes sealSpin {
  0%   { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0) rotate(360deg); opacity: 0; }
}

/* White flash transition screen */
#white-flash {
  position: absolute;
  inset: 0;
  background: #ffffff;
  z-index: 250; /* Sits on top of envelope and gallery */
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}
#white-flash.show {
  opacity: 1;
}


/* ================================================================
   GALLERY — 6 portrait screens
================================================================ */
#gallery {
  position: absolute;
  inset: 0;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  opacity: 0;
  pointer-events: none;
}
#gallery::-webkit-scrollbar { display:none; }
#gallery.show {
  opacity: 1;
  pointer-events: all;
}

/* Viewport-locked, snap scroll screens with matching cream background color */
.screen {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  background: #fcefe3; /* Seamless peach slide fallback */
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Complete full screen image cover optimized for extreme sharpness & 8K text clarity */
.screen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
  
  /* Safari/Chrome image scaling contrast optimizations for high-res details */
  image-rendering: -webkit-optimize-contrast;
  image-rendering: auto;
  
  /* Force hardware compositing to keep text crystal clear */
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

/* ── Dot progress ── */
#dots {
  position: fixed;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  opacity: 0;
  transition: opacity .5s;
}
#dots.show { opacity: 1; }
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  border: 1.5px solid rgba(255,255,255,.4);
  cursor: pointer;
  transition: all .3s;
}
.dot.on {
  background: #aa7c11;
  border-color: #d4af37;
  transform: scale(1.5);
  box-shadow: 0 0 10px rgba(212,175,55,.8);
}

/* ── Scratch & Countdown Screen Styles ── */
.scratch-container, .countdown-container {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transition: opacity 1.0s cubic-bezier(0.25, 1, 0.5, 1);
}
.scratch-container {
  opacity: 0;
  pointer-events: none;
  z-index: 2;
}
.scratch-container.active {
  opacity: 1;
  pointer-events: all;
}
.countdown-container {
  opacity: 0;
  pointer-events: none;
  z-index: 1;
}
.countdown-container.active {
  opacity: 1;
  pointer-events: all;
}

/* Overlays precisely aligned with the background image aspect ratio */
.scratch-overlay-wrapper, .countdown-overlay-wrapper {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  height: 100%;
  aspect-ratio: 576 / 1024;
  width: auto;
  max-width: 100%;
  pointer-events: none;
}

/* Scratch Card styling */
.scratch-card {
  position: absolute;
  top: 67.5%;
  transform: translate(-50%, -50%);
  width: 24%; /* Responsive width perfectly covering background Ganesha hearts */
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: all;
}
#card1 { left: 25.6%; }
#card2 { left: 50.8%; }
#card3 { left: 75.2%; }

.scratch-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
  touch-action: none;
  z-index: 10;
  transition: opacity 0.5s ease;
}

.scratch-value {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.revealed-heart {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 4px 8px rgba(189, 105, 56, 0.25));
}
.revealed-text {
  position: absolute;
  font-family: 'Didot', 'Georgia', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: #8c2d19;
  text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.8);
}

/* Countdown dynamic overlay boxes */
.countdown-live-box {
  position: absolute;
  top: 67.5%;
  transform: translate(-50%, -50%);
  width: 13.5%;
  height: 6%;
  background: #9cb4c9; /* Beautiful matching slate/steel-blue! */
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.countdown-live-number {
  font-family: 'Playfair Display', 'Didot', 'Georgia', serif;
  font-size: 1.8rem;
  font-weight: 300;
  color: #ffffff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

</style>

<body>

<script>
/* ── Elements ── */
const envEl    = document.getElementById('env');
const seal     = document.getElementById('seal');
const gallery  = document.getElementById('gallery');
const dotsEl   = document.getElementById('dots');
const canvas   = document.getElementById('particles');
const ctx      = canvas.getContext('2d');
const screens  = Array.from(gallery.querySelectorAll('.screen'));
const dots     = Array.from(dotsEl.querySelectorAll('.dot'));
let opened     = false;

/* ── Particles (Inert) ── */
canvas.width  = canvas.offsetWidth  || window.innerWidth;
canvas.height = canvas.offsetHeight || window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
});

/* ── Open sequence ── */
function openInvitation() {
  if (opened) return;
  opened = true;

  // 1. Gold Ganesha seal and printed Ganesha wax coin disappear instantly
  seal.style.display = 'none';
  const mask = document.getElementById('seal-mask');
  if (mask) mask.classList.add('show');

  // 2. Animate the upper leaflet/flap folding up in 3D slowly (3.0s duration)
  const envUpper = document.getElementById('env-upper');
  envUpper.classList.add('open');

  // 3. Exactly when the flap reaches ~50% open (at 3 seconds), make the screen solid white instantly
  // and load the gallery screen under it
  const flash = document.getElementById('white-flash');
  setTimeout(() => {
    // Solid white screen instantly (no fade-in delay)
    flash.style.transition = 'none';
    flash.classList.add('show');

    // Load the gallery & dots under the white curtain
    envEl.style.display = 'none';
    gallery.classList.add('show');
    dotsEl.classList.add('show');
    gallery.scrollTop = 0;
    
    // Initialize the scratch canvases now that the gallery is visible and rendered!
    initScratchCards();
  }, 3000);

  // 4. Stay solid white for exactly 0.5s (until 3500ms total), then smoothly fade out over 0.5s
  setTimeout(() => {
    flash.style.transition = 'opacity 0.5s ease';
    flash.classList.remove('show');
  }, 3500);
}

seal.addEventListener('click', openInvitation);
seal.addEventListener('touchend', e => { e.preventDefault(); openInvitation(); });

/* ── Scratch Card Logic ── */
let allScratchedTriggered = false;
let countdownInterval;

function initScratchCards() {
  const cards = [
    { canvasId: 'canvas1', pctX: 25.6 },
    { canvasId: 'canvas2', pctX: 50.8 },
    { canvasId: 'canvas3', pctX: 75.2 }
  ];

  const bgImg = new Image();
  bgImg.src = 'assets/date1_scratch.jpg?v=3';
  bgImg.onload = () => {
    cards.forEach(card => {
      const canvas = document.getElementById(card.canvasId);
      if (!canvas) return;
      const ctxScratch = canvas.getContext('2d');
      
      // Set actual pixel dimensions based on element size to prevent blurring
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * window.devicePixelRatio;
      canvas.height = rect.height * window.devicePixelRatio;
      ctxScratch.scale(window.devicePixelRatio, window.devicePixelRatio);
      
      const w = rect.width;
      const h = rect.height;
      
      // Crop exact background image region (from 576x1024 source image)
      const srcW = 576;
      const srcH = 1024;
      
      // Card width in CSS is 24% (so we crop exactly 24% width & height)
      const cropW = srcW * 0.24;
      const cropH = srcW * 0.24; // 1:1 square
      
      const sx = srcW * (card.pctX / 100) - cropW / 2;
      const sy = srcH * 0.675 - cropH / 2;
      
      // Draw pixel-perfect crop onto canvas
      ctxScratch.drawImage(bgImg, sx, sy, cropW, cropH, 0, 0, w, h);
      
      setupScratchEvents(canvas, ctxScratch);
    });
  };
}

function setupScratchEvents(canvas, ctxScratch) {
  let isDrawing = false;
  
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: clientX - rect.left,
      y: clientY - rect.top
    };
  }

  function draw(e) {
    if (!isDrawing) return;
    const pos = getPos(e);
    
    // Erase canvas pixels using destination-out transparency
    ctxScratch.globalCompositeOperation = 'destination-out';
    ctxScratch.beginPath();
    ctxScratch.arc(pos.x, pos.y, 14, 0, Math.PI * 2); // 14px eraser radius
    ctxScratch.fill();
    
    // Stagger check calculation for responsiveness
    if (Math.random() < 0.15) {
      checkScratchPercent();
    }
  }

  function checkScratchPercent() {
    const w = canvas.width;
    const h = canvas.height;
    const imgData = ctxScratch.getImageData(0, 0, w, h);
    const pixels = imgData.data;
    let clearCount = 0;
    
    // Check alpha values (index 3, 7, 11, etc. in RGBA array)
    for (let i = 3; i < pixels.length; i += 16) {
      if (pixels[i] === 0) {
        clearCount++;
      }
    }
    
    const totalSampled = pixels.length / 16;
    const percent = (clearCount / totalSampled) * 100;
    
    if (percent > 45) { // 45% scratch-out threshold
      canvas.style.pointerEvents = 'none';
      canvas.style.opacity = '0';
      setTimeout(() => {
        canvas.remove();
        checkAllScratched();
      }, 500);
    }
  }

  canvas.addEventListener('mousedown', () => { isDrawing = true; });
  canvas.addEventListener('mousemove', draw);
  window.addEventListener('mouseup', () => { isDrawing = false; });

  canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); });
  canvas.addEventListener('touchmove', (e) => { draw(e); e.preventDefault(); });
  window.addEventListener('touchend', () => { isDrawing = false; });
}

function checkAllScratched() {
  if (allScratchedTriggered) return;
  
  const remainingCanvases = document.querySelectorAll('.scratch-canvas');
  if (remainingCanvases.length === 0) {
    allScratchedTriggered = true;
    
    // Stay on Date 1 screen for exactly 1.0s to read revealed date, then fade to Save the Date
    setTimeout(() => {
      // Fade out scratch screen
      const scratchScreen = document.getElementById('scratch-screen');
      if (scratchScreen) scratchScreen.classList.remove('active');
      
      // Fade in Save the Date screen
      const countdownScreen = document.getElementById('countdown-screen');
      if (countdownScreen) countdownScreen.classList.add('active');
      
      // Unlock gallery scrolling!
      gallery.style.overflowY = 'scroll';
      
      // Start dynamic live countdown timer!
      startCountdownTimer();
    }, 1000);
  }
}

/* ── Live Dynamic Countdown Logic ── */
function startCountdownTimer() {
  // Target: November 22, 2026 at 00:00:00 Midnight
  const targetDate = new Date('November 22, 2026 00:00:00').getTime();
  
  const dEl = document.getElementById('countdown-days');
  const hEl = document.getElementById('countdown-hours');
  const mEl = document.getElementById('countdown-minutes');
  const sEl = document.getElementById('countdown-seconds');
  
  if (!dEl || !hEl || !mEl || !sEl) return;
  
  function update() {
    const now = new Date().getTime();
    const distance = targetDate - now;
    
    if (distance < 0) {
      clearInterval(countdownInterval);
      dEl.innerText = '00';
      hEl.innerText = '00';
      mEl.innerText = '00';
      sEl.innerText = '00';
      return;
    }
    
    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
    
    dEl.innerText = String(days).padStart(2, '0');
    hEl.innerText = String(hours).padStart(2, '0');
    mEl.innerText = String(minutes).padStart(2, '0');
    sEl.innerText = String(seconds).padStart(2, '0');
  }
  
  update();
  clearInterval(countdownInterval);
  countdownInterval = setInterval(update, 1000);
}

/* ── Scroll & Dot Sync ── */
gallery.addEventListener('scroll', () => {
  const scrollTop = gallery.scrollTop;
  const galleryHeight = gallery.clientHeight;
  const scrollCenter = scrollTop + galleryHeight / 2;

  let activeIndex = 0;
  let minDistance = Infinity;

  screens.forEach((s, i) => {
    const screenCenter = s.offsetTop + s.offsetHeight / 2;
    const distance = Math.abs(scrollCenter - screenCenter);
    if (distance < minDistance) {
      minDistance = distance;
      activeIndex = i;
    }
  });

  dots.forEach((d, j) => d.classList.toggle('on', activeIndex === j));

  // Snap-lock on Slide 2 Scratch card screen until completely scratched!
  if (activeIndex === 1 && !allScratchedTriggered) {
    gallery.style.overflowY = 'hidden';
    screens[1].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});

dots.forEach((d, i) => {
  d.addEventListener('click', () => {
    // Prevent navigating past Scratch card until revealed
    if (i > 1 && !allScratchedTriggered) {
      screens[1]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      return;
    }
    screens[i]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});

/* ── Preload ── */
setTimeout(() => {
  ['date1_scratch', 'date2_countdown', 'slide2_engagement','slide3_haldi','slide4_mehendi_sangeet','slide5_wedding','slide6_reception']
    .forEach(n => { const img = new Image(); img.src = `assets/${n}.jpg?v=3`; });
}, 800);
</script>
