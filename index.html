<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sambit &amp; Akanksha — Wedding Invitation</title>
<style>

/* ── Reset ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width: 100%; height: 100%;
  background: #1a0e28;
  display: flex;
  justify-content: center;
  overflow: hidden;
}

/* Phone shell */
#app {
  position: relative;
  width: 100vw;
  max-width: 430px;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: #0e0812;
}

/* ================================================================
   PARTICLES CANVAS (behind everything)
================================================================ */
#particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity .3s;
}
#particles.show { opacity: 1; }

/* ================================================================
   ENVELOPE SCREEN
================================================================ */
#env {
  position: absolute;
  inset: 0;
  background: #3e040c;
  z-index: 200;
  transition: opacity 1.4s ease, transform 1.4s ease;
  overflow: hidden;
}
#env.out { opacity: 0; transform: scale(1.15); pointer-events: none; }

/* Full screen cover image for starting envelope screen */
.env-bg-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Pulsing click target exactly aligned with Ganesha wax seal in the image */
.seal {
  position: absolute;
  top: 51.7%; /* Perfectly balanced centered vertical height of Ganesha wax seal */
  left: 50%;
  transform: translate(-50%, -50%);
  width: 76px;
  height: 76px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 10;
  -webkit-user-select: none;
  user-select: none;
  
  /* Auspicious gold pulsing outline animation */
  box-shadow: 0 0 0 0 rgba(252, 233, 144, 0.45);
  animation: sealPulse 2.2s infinite ease-in-out;
}
@keyframes sealPulse {
  0% { box-shadow: 0 0 0 0 rgba(252, 233, 144, 0.45); }
  70% { box-shadow: 0 0 0 16px rgba(252, 233, 144, 0); }
  100% { box-shadow: 0 0 0 0 rgba(252, 233, 144, 0); }
}

/* Seal click spinning effect */
.seal.spinning {
  animation: sealSpin .6s ease-in-out forwards;
}
@keyframes sealSpin {
  0%   { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(0) rotate(360deg); opacity: 0; }
}

/* Flap open */
.env-box.open .flap-t {
  transform: rotateX(200deg);
  z-index: 1;
}
/* Card slide up dramatically */
.env-box.open .inner-card {
  transform: translateY(-120%) scale(1.02);
  z-index: 5;
  box-shadow: 0 30px 60px rgba(93,63,155,.4);
}

/* Tap hint */
.tap-hint {
  font-family: Georgia, serif;
  font-size: .74rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: #6d4fa8;
  font-weight: 600;
  text-shadow: 0 1px 4px rgba(255,255,255,.9);
  animation: hint 2.2s infinite ease-in-out;
  z-index: 5;
}
@keyframes hint {
  0%,100% { opacity:.45; transform:scale(1); }
  50%      { opacity:1;   transform:scale(1.04); }
}

/* Light burst on open */
.burst {
  position: absolute;
  top:50%; left:50%;
  width:10px; height:10px;
  border-radius:50%;
  background:rgba(255,240,150,.9);
  transform:translate(-50%,-50%) scale(0);
  z-index: 10;
  pointer-events:none;
  opacity:0;
}
.burst.go {
  animation: burstAnim .7s ease-out forwards;
}
@keyframes burstAnim {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:1; }
  60%  { transform:translate(-50%,-50%) scale(40); opacity:.6; }
  100% { transform:translate(-50%,-50%) scale(80); opacity:0; }
}


/* ================================================================
   GALLERY — 6 portrait screens
================================================================ */
#gallery {
  position: absolute;
  inset: 0;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.8s ease, clip-path 1.8s cubic-bezier(0.25, 1, 0.5, 1), -webkit-clip-path 1.8s cubic-bezier(0.25, 1, 0.5, 1);
  -webkit-clip-path: circle(0% at 50% 50%);
  clip-path: circle(0% at 50% 50%);
}
#gallery::-webkit-scrollbar { display:none; }
#gallery.show {
  opacity: 1;
  pointer-events: all;
  -webkit-clip-path: circle(120% at 50% 50%);
  clip-path: circle(120% at 50% 50%);
}

/* Viewport-locked, snap scroll screens with matching cream background color */
.screen {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  background: #f5ecd8;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Custom sage green background for Mehendi & Sangeet (slide 3) to blend seamlessly */
#s3 {
  background: #d4e3cb;
}

/* Complete full screen image cover */
.screen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
}

/* ── Dot progress ── */
#dots {
  position: fixed;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  opacity: 0;
  transition: opacity .5s;
}
#dots.show { opacity: 1; }
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  border: 1.5px solid rgba(255,255,255,.4);
  cursor: pointer;
  transition: all .3s;
}
.dot.on {
  background: #aa7c11;
  border-color: #d4af37;
  transform: scale(1.5);
  box-shadow: 0 0 10px rgba(212,175,55,.8);
}

</style>
</head>
<body>

<div id="app">

  <!-- Particle canvas for gold burst -->
  <canvas id="particles"></canvas>

  <!-- ── Envelope Screen ── -->
  <div id="env">
    <!-- Full-screen Crimson & Gold Envelope Image -->
    <img src="assets/envelope_start.jpg?v=4" class="env-bg-img" alt="Wedding Invitation Envelope">
    
    <!-- Transparent click/touch target perfectly aligned with Ganesha wax seal in the center -->
    <div class="seal" id="seal"></div>
  </div>


  <!-- ── Gallery ── -->
  <div id="gallery">

    <div class="screen" id="s1" data-i="0">
      <img src="assets/slide1_married.jpg?v=4" alt="We are getting married" loading="eager">
    </div>

    <div class="screen" id="s2" data-i="1">
      <img src="assets/slide2_engagement_haldi.jpg?v=4" alt="Engagement & Haldi" loading="lazy">
    </div>

    <div class="screen" id="s3" data-i="2">
      <img src="assets/slide3_mehendi_sangeet.jpg?v=4" alt="Mehendi & Sangeet" loading="lazy">
    </div>

    <div class="screen" id="s4" data-i="3">
      <img src="assets/slide4_wedding.jpg?v=4" alt="The Wedding" loading="lazy">
    </div>

    <div class="screen" id="s5" data-i="4">
      <img src="assets/slide5_reception.jpg?v=4" alt="Grand Reception" loading="lazy">
    </div>

    <div class="screen" id="s6" data-i="5">
      <img src="assets/slide6_thankyou.jpg?v=4" alt="Thank You" loading="lazy">
    </div>

  </div>

  <!-- Dots -->
  <div id="dots">
    <div class="dot on"  data-go="0"></div>
    <div class="dot"     data-go="1"></div>
    <div class="dot"     data-go="2"></div>
    <div class="dot"     data-go="3"></div>
    <div class="dot"     data-go="4"></div>
    <div class="dot"     data-go="5"></div>
  </div>

</div><!-- /app -->

<script>
/* ── Elements ── */
const envEl    = document.getElementById('env');
const seal     = document.getElementById('seal');
const gallery  = document.getElementById('gallery');
const dotsEl   = document.getElementById('dots');
const canvas   = document.getElementById('particles');
const ctx      = canvas.getContext('2d');
const screens  = Array.from(gallery.querySelectorAll('.screen'));
const dots     = Array.from(dotsEl.querySelectorAll('.dot'));
let opened     = false;

/* ── Particles ── */
canvas.width  = canvas.offsetWidth  || window.innerWidth;
canvas.height = canvas.offsetHeight || window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
});

const particles = [];
const COLORS = ['#fce990','#d4af37','#aa7c11','#fff8c0','#f0c040','#ffecb0'];

function spawnParticles() {
  canvas.style.opacity = 1;
  for (let i = 0; i < 120; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 7;
    particles.push({
      x: canvas.width / 2,
      y: canvas.height / 2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      r: 2 + Math.random() * 4,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: 1,
      gravity: .12 + Math.random() * .08,
      decay: .012 + Math.random() * .015
    });
  }
  animateParticles();
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  for (const p of particles) {
    if (p.alpha <= 0) continue;
    alive = true;
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += p.gravity;
    p.vx *= .97;
    p.alpha -= p.decay;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  if (alive) requestAnimationFrame(animateParticles);
  else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.opacity = 0; }
}

/* ── Open sequence ── */
function openInvitation() {
  if (opened) return;
  opened = true;

  // 1. Gold Ganesha seal spins and fades out
  seal.classList.add('spinning');

  // 2. Gold burst + particles instantly at the center
  spawnParticles();
  canvas.style.zIndex = 150;

  // 3. Directly trigger circular center reveal of the gallery immediately
  setTimeout(() => {
    envEl.classList.add('out');
    gallery.classList.add('show');
    dotsEl.classList.add('show');
    gallery.scrollTop = 0;
  }, 250);

  // 4. Remove envelope after transition completes
  setTimeout(() => { 
    envEl.style.display = 'none'; 
  }, 2200);
}

seal.addEventListener('click', openInvitation);
seal.addEventListener('touchend', e => { e.preventDefault(); openInvitation(); });

/* ── Scroll & Dot Sync ── */
gallery.addEventListener('scroll', () => {
  const scrollTop = gallery.scrollTop;
  const galleryHeight = gallery.clientHeight;
  const scrollCenter = scrollTop + galleryHeight / 2;

  let activeIndex = 0;
  let minDistance = Infinity;

  screens.forEach((s, i) => {
    const screenCenter = s.offsetTop + s.offsetHeight / 2;
    const distance = Math.abs(scrollCenter - screenCenter);
    if (distance < minDistance) {
      minDistance = distance;
      activeIndex = i;
    }
  });

  dots.forEach((d, j) => d.classList.toggle('on', activeIndex === j));
});

dots.forEach((d, i) => {
  d.addEventListener('click', () => {
    screens[i]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});

/* ── Preload ── */
setTimeout(() => {
  ['slide2_engagement_haldi','slide3_mehendi_sangeet','slide4_wedding','slide5_reception','slide6_thankyou']
    .forEach(n => { const img = new Image(); img.src = `assets/${n}.jpg?v=4`; });
}, 800);
</script>

</body>
</html>
