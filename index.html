<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sambit &amp; Akanksha — Wedding Invitation</title>
<style>

/* ── Reset ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html,body {
  width: 100%; height: 100%;
  background: #fdf6ee; /* Warm soft peach/cream backdrop */
  display: flex;
  justify-content: center;
  overflow: hidden;
}

/* Phone shell */
#app {
  position: relative;
  width: 100vw;
  max-width: 430px;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: #fcefe3; /* Peach cream mobile frame */
}

/* ================================================================
   PARTICLES CANVAS (behind everything)
================================================================ */
#particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity .3s;
}
#particles.show { opacity: 1; }

/* ================================================================
   ENVELOPE SCREEN
================================================================ */
#env {
  position: absolute;
  inset: 0;
  background: #fcefe3; /* Seamless peach envelope fallback */
  z-index: 200;
  overflow: hidden;
  
  /* Elegant diagonal brush sweep mask */
  -webkit-mask-image: linear-gradient(135deg, transparent 0%, transparent 40%, rgba(0, 0, 0, 0.4) 52%, black 65%, black 100%);
  mask-image: linear-gradient(135deg, transparent 0%, transparent 40%, rgba(0, 0, 0, 0.4) 52%, black 65%, black 100%);
  -webkit-mask-size: 300% 300%;
  mask-size: 300% 300%;
  -webkit-mask-position: 100% 100%;
  mask-position: 100% 100%;
  
  transition: opacity 2.2s cubic-bezier(0.25, 1, 0.5, 1),
              -webkit-mask-position 2.2s cubic-bezier(0.25, 1, 0.5, 1),
              mask-position 2.2s cubic-bezier(0.25, 1, 0.5, 1);
}
#env.out { 
  opacity: 0; 
  -webkit-mask-position: 0% 0%; 
  mask-position: 0% 0%; 
  pointer-events: none; 
}

/* Full screen cover image for starting envelope screen */
.env-bg-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Pulsing click target exactly aligned with Ganesha wax seal in the image */
.seal {
  position: absolute;
  top: 73.5%; /* Aligned with Ganesha wax seal in the new peach starting envelope */
  left: 50%;
  transform: translate(-50%, -50%);
  width: 76px;
  height: 76px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 10;
  -webkit-user-select: none;
  user-select: none;
  
  /* Auspicious gold pulsing outline animation */
  box-shadow: 0 0 0 0 rgba(252, 233, 144, 0.45);
  animation: sealPulse 2.2s infinite ease-in-out;
}
@keyframes sealPulse {
  0% { box-shadow: 0 0 0 0 rgba(252, 233, 144, 0.45); }
  70% { box-shadow: 0 0 0 16px rgba(252, 233, 144, 0); }
  100% { box-shadow: 0 0 0 0 rgba(252, 233, 144, 0); }
}

/* Seal click spinning effect */
.seal.spinning {
  animation: sealSpin .6s ease-in-out forwards;
}
@keyframes sealSpin {
  0%   { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(0) rotate(360deg); opacity: 0; }
}

/* Flap open */
.env-box.open .flap-t {
  transform: rotateX(200deg);
  z-index: 1;
}
/* Card slide up dramatically */
.env-box.open .inner-card {
  transform: translateY(-120%) scale(1.02);
  z-index: 5;
  box-shadow: 0 30px 60px rgba(93,63,155,.4);
}

/* Tap hint */
.tap-hint {
  font-family: Georgia, serif;
  font-size: .74rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: #6d4fa8;
  font-weight: 600;
  text-shadow: 0 1px 4px rgba(255,255,255,.9);
  animation: hint 2.2s infinite ease-in-out;
  z-index: 5;
}
@keyframes hint {
  0%,100% { opacity:.45; transform:scale(1); }
  50%      { opacity:1;   transform:scale(1.04); }
}

/* Light burst on open */
.burst {
  position: absolute;
  top:50%; left:50%;
  width:10px; height:10px;
  border-radius:50%;
  background:rgba(255,240,150,.9);
  transform:translate(-50%,-50%) scale(0);
  z-index: 10;
  pointer-events:none;
  opacity:0;
}
.burst.go {
  animation: burstAnim .7s ease-out forwards;
}
@keyframes burstAnim {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:1; }
  60%  { transform:translate(-50%,-50%) scale(40); opacity:.6; }
  100% { transform:translate(-50%,-50%) scale(80); opacity:0; }
}


/* ================================================================
   GALLERY — 6 portrait screens
================================================================ */
#gallery {
  position: absolute;
  inset: 0;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease;
}
#gallery::-webkit-scrollbar { display:none; }
#gallery.show {
  opacity: 1;
  pointer-events: all;
}

/* Viewport-locked, snap scroll screens with matching cream background color */
.screen {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  background: #fcefe3; /* Seamless peach slide fallback */
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Complete full screen image cover */
.screen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
}

/* Double door reveal */
.door-container {
  position: absolute;
  inset: 0;
  display: flex;
  z-index: 10;
  pointer-events: none;
}
.door {
  width: 50%;
  height: 100%;
  background: #f7dfcb; /* Beautiful peach color matching the new Ganesha envelope */
  transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
  transform: translateX(0);
}
.d-left {
  box-shadow: 8px 0 16px rgba(0,0,0,0.5);
  z-index: 2;
}
.d-right {
  box-shadow: -8px 0 16px rgba(0,0,0,0.5);
  z-index: 2;
}
#gallery.show .d-left {
  transform: translateX(-100%);
  transition-delay: 1.8s;
}
#gallery.show .d-right {
  transform: translateX(100%);
  transition-delay: 1.8s;
}

/* Text reveal container */
.text-reveal-container {
  position: absolute;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  display: flex;
  flex-direction: column;
}

/* Individual text covering strips */
.tr-strip {
  width: 100%;
  background: #fdf5ec; /* Warm parchment cream color to match the scroll background */
  transition: opacity 1.2s ease;
  opacity: 1;
}

/* Precise vertical heights covering the text elements on the scroll */
.tr-spacer-top {
  height: 33%; /* Top of the scroll roll is always visible! */
  background: transparent;
}
.tr-title {
  height: 15%; /* Covers: Engagement / Haldi / Wedding / Akanksha & Sambit */
}
.tr-date {
  height: 13%; /* Covers: DATE & Date numbers */
}
.tr-quote {
  height: 9%;  /* Covers: Sub-quotes / Parent details */
}
.tr-venue {
  height: 10%; /* Covers: VENUE & Venue details */
}
.tr-time {
  height: 8%;  /* Covers: TIME & Timings */
}
.tr-spacer-bottom {
  height: 12%; /* Bottom decoration of the scroll is always visible! */
  background: transparent;
}

/* Active slide animation — text fades in one by one, second by second */
.screen.active .tr-title {
  opacity: 0;
  transition-delay: 0.5s; /* 0.5s: Title appears! */
}
.screen.active .tr-date {
  opacity: 0;
  transition-delay: 1.5s; /* 1.5s: Date appears! */
}
.screen.active .tr-quote {
  opacity: 0;
  transition-delay: 2.5s; /* 2.5s: Quote/Parents appear! */
}
.screen.active .tr-venue {
  opacity: 0;
  transition-delay: 3.5s; /* 3.5s: Venue appears! */
}
.screen.active .tr-time {
  opacity: 0;
  transition-delay: 4.5s; /* 4.5s: Time appears! */
}

/* Slide 1 Stagger Delays (starts after the double doors open at 1.8s) */
#s1.active .tr-title {
  transition-delay: 2.3s;
}
#s1.active .tr-date {
  transition-delay: 3.3s;
}
#s1.active .tr-quote {
  transition-delay: 4.3s;
}
#s1.active .tr-venue {
  transition-delay: 5.3s;
}
#s1.active .tr-time {
  transition-delay: 6.3s;
}

/* ── Dot progress ── */
#dots {
  position: fixed;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  opacity: 0;
  transition: opacity .5s;
}
#dots.show { opacity: 1; }
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  border: 1.5px solid rgba(255,255,255,.4);
  cursor: pointer;
  transition: all .3s;
}
.dot.on {
  background: #aa7c11;
  border-color: #d4af37;
  transform: scale(1.5);
  box-shadow: 0 0 10px rgba(212,175,55,.8);
}

</style>
</head>
<body>

<div id="app">

  <!-- Particle canvas for gold burst -->
  <canvas id="particles"></canvas>

  <!-- ── Envelope Screen ── -->
  <div id="env">
    <!-- Full-screen Peach & Gold Envelope Image -->
    <img src="assets/envelope_start.jpg?v=2" class="env-bg-img" alt="Wedding Invitation Envelope">
    
    <!-- Transparent click/touch target perfectly aligned with Ganesha wax seal in the center -->
    <div class="seal" id="seal"></div>
  </div>


  <!-- ── Gallery ── -->
  <div id="gallery">

    <div class="screen" id="s1" data-i="0">
      <img src="assets/slide1_intro.jpg?v=2" alt="Akanksha & Sambit Introduction Card" loading="eager">
      <!-- Magical text reveal overlays -->
      <div class="text-reveal-container">
        <div class="tr-spacer-top"></div>
        <div class="tr-strip tr-title"></div>
        <div class="tr-strip tr-date"></div>
        <div class="tr-strip tr-quote"></div>
        <div class="tr-strip tr-venue"></div>
        <div class="tr-strip tr-time"></div>
        <div class="tr-spacer-bottom"></div>
      </div>
      <!-- Double door reveal panels -->
      <div class="door-container">
        <div class="d-left door"></div>
        <div class="d-right door"></div>
      </div>
    </div>

    <div class="screen" id="s2" data-i="1">
      <img src="assets/slide2_engagement.jpg?v=2" alt="Engagement Scroll Card" loading="lazy">
      <div class="text-reveal-container">
        <div class="tr-spacer-top"></div>
        <div class="tr-strip tr-title"></div>
        <div class="tr-strip tr-date"></div>
        <div class="tr-strip tr-quote"></div>
        <div class="tr-strip tr-venue"></div>
        <div class="tr-strip tr-time"></div>
        <div class="tr-spacer-bottom"></div>
      </div>
    </div>

    <div class="screen" id="s3" data-i="2">
      <img src="assets/slide3_haldi.jpg?v=2" alt="Haldi Scroll Card" loading="lazy">
      <div class="text-reveal-container">
        <div class="tr-spacer-top"></div>
        <div class="tr-strip tr-title"></div>
        <div class="tr-strip tr-date"></div>
        <div class="tr-strip tr-quote"></div>
        <div class="tr-strip tr-venue"></div>
        <div class="tr-strip tr-time"></div>
        <div class="tr-spacer-bottom"></div>
      </div>
    </div>

    <div class="screen" id="s4" data-i="3">
      <img src="assets/slide4_mehendi_sangeet.jpg?v=2" alt="Mehendi & Sangeet Scroll Card" loading="lazy">
      <div class="text-reveal-container">
        <div class="tr-spacer-top"></div>
        <div class="tr-strip tr-title"></div>
        <div class="tr-strip tr-date"></div>
        <div class="tr-strip tr-quote"></div>
        <div class="tr-strip tr-venue"></div>
        <div class="tr-strip tr-time"></div>
        <div class="tr-spacer-bottom"></div>
      </div>
    </div>

    <div class="screen" id="s5" data-i="4">
      <img src="assets/slide5_wedding.jpg?v=2" alt="Wedding Scroll Card" loading="lazy">
      <div class="text-reveal-container">
        <div class="tr-spacer-top"></div>
        <div class="tr-strip tr-title"></div>
        <div class="tr-strip tr-date"></div>
        <div class="tr-strip tr-quote"></div>
        <div class="tr-strip tr-venue"></div>
        <div class="tr-strip tr-time"></div>
        <div class="tr-spacer-bottom"></div>
      </div>
    </div>

    <div class="screen" id="s6" data-i="5">
      <img src="assets/slide6_reception.jpg?v=2" alt="Reception Scroll Card" loading="lazy">
      <div class="text-reveal-container">
        <div class="tr-spacer-top"></div>
        <div class="tr-strip tr-title"></div>
        <div class="tr-strip tr-date"></div>
        <div class="tr-strip tr-quote"></div>
        <div class="tr-strip tr-venue"></div>
        <div class="tr-strip tr-time"></div>
        <div class="tr-spacer-bottom"></div>
      </div>
    </div>

  </div>

  <!-- Dots -->
  <div id="dots">
    <div class="dot on"  data-go="0"></div>
    <div class="dot"     data-go="1"></div>
    <div class="dot"     data-go="2"></div>
    <div class="dot"     data-go="3"></div>
    <div class="dot"     data-go="4"></div>
    <div class="dot"     data-go="5"></div>
  </div>

</div><!-- /app -->

<script>
/* ── Elements ── */
const envEl    = document.getElementById('env');
const seal     = document.getElementById('seal');
const gallery  = document.getElementById('gallery');
const dotsEl   = document.getElementById('dots');
const canvas   = document.getElementById('particles');
const ctx      = canvas.getContext('2d');
const screens  = Array.from(gallery.querySelectorAll('.screen'));
const dots     = Array.from(dotsEl.querySelectorAll('.dot'));
let opened     = false;

/* ── Particles (Inert) ── */
canvas.width  = canvas.offsetWidth  || window.innerWidth;
canvas.height = canvas.offsetHeight || window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
});

/* ── Open sequence ── */
function openInvitation() {
  if (opened) return;
  opened = true;

  // 1. Gold Ganesha seal spins and fades out
  seal.classList.add('spinning');

  // 2. Trigger slow brush diagonal sweep of envelope after seal fade (2.2s duration)
  setTimeout(() => {
    envEl.classList.add('out');
    gallery.classList.add('show');
    dotsEl.classList.add('show');
    gallery.scrollTop = 0;
    
    // Proactively set slide 1 active for its reveal animation
    screens[0]?.classList.add('active');
  }, 250);

  // 3. Remove envelope after transition completes
  setTimeout(() => { 
    envEl.style.display = 'none'; 
  }, 3200);
}

seal.addEventListener('click', openInvitation);
seal.addEventListener('touchend', e => { e.preventDefault(); openInvitation(); });

/* ── Scroll & Dot Sync ── */
gallery.addEventListener('scroll', () => {
  const scrollTop = gallery.scrollTop;
  const galleryHeight = gallery.clientHeight;
  const scrollCenter = scrollTop + galleryHeight / 2;

  let activeIndex = 0;
  let minDistance = Infinity;

  screens.forEach((s, i) => {
    const screenCenter = s.offsetTop + s.offsetHeight / 2;
    const distance = Math.abs(scrollCenter - screenCenter);
    if (distance < minDistance) {
      minDistance = distance;
      activeIndex = i;
    }
  });

  dots.forEach((d, j) => d.classList.toggle('on', activeIndex === j));
  
  // Staggered reveal toggle active slide
  screens.forEach((s, i) => s.classList.toggle('active', activeIndex === i));
});

dots.forEach((d, i) => {
  d.addEventListener('click', () => {
    screens[i]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});

/* ── Preload ── */
setTimeout(() => {
  ['slide2_engagement','slide3_haldi','slide4_mehendi_sangeet','slide5_wedding','slide6_reception']
    .forEach(n => { const img = new Image(); img.src = `assets/${n}.jpg?v=2`; });
}, 800);
</script>

</body>
</html>
