<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sambit &amp; Akanksha — Wedding Invitation</title>
<style>

/* ── Reset ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width: 100%; height: 100%;
  background: #1a0e28;
  display: flex;
  justify-content: center;
  overflow: hidden;
}

/* Phone shell */
#app {
  position: relative;
  width: 100vw;
  max-width: 430px;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: #0e0812;
}

/* ================================================================
   PARTICLES CANVAS (behind everything)
================================================================ */
#particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity .3s;
}
#particles.show { opacity: 1; }

/* ================================================================
   ENVELOPE SCREEN
================================================================ */
#env {
  position: absolute;
  inset: 0;
  background: #3e040c;
  z-index: 200;
  overflow: hidden;
  
  /* Elegant diagonal brush sweep mask */
  -webkit-mask-image: linear-gradient(135deg, transparent 0%, transparent 40%, rgba(0, 0, 0, 0.4) 52%, black 65%, black 100%);
  mask-image: linear-gradient(135deg, transparent 0%, transparent 40%, rgba(0, 0, 0, 0.4) 52%, black 65%, black 100%);
  -webkit-mask-size: 300% 300%;
  mask-size: 300% 300%;
  -webkit-mask-position: 100% 100%;
  mask-position: 100% 100%;
  
  transition: opacity 3.2s cubic-bezier(0.25, 1, 0.5, 1),
              -webkit-mask-position 3.2s cubic-bezier(0.25, 1, 0.5, 1),
              mask-position 3.2s cubic-bezier(0.25, 1, 0.5, 1);
}
#env.out { 
  opacity: 0; 
  -webkit-mask-position: 0% 0%; 
  mask-position: 0% 0%; 
  pointer-events: none; 
}

/* Full screen cover image for starting envelope screen */
.env-bg-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Pulsing click target exactly aligned with Ganesha wax seal in the image */
.seal {
  position: absolute;
  top: 51.7%; /* Perfectly balanced centered vertical height of Ganesha wax seal */
  left: 50%;
  transform: translate(-50%, -50%);
  width: 76px;
  height: 76px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 10;
  -webkit-user-select: none;
  user-select: none;
  
  /* Auspicious gold pulsing outline animation */
  box-shadow: 0 0 0 0 rgba(252, 233, 144, 0.45);
  animation: sealPulse 2.2s infinite ease-in-out;
}
@keyframes sealPulse {
  0% { box-shadow: 0 0 0 0 rgba(252, 233, 144, 0.45); }
  70% { box-shadow: 0 0 0 16px rgba(252, 233, 144, 0); }
  100% { box-shadow: 0 0 0 0 rgba(252, 233, 144, 0); }
}

/* Seal click spinning effect */
.seal.spinning {
  animation: sealSpin .6s ease-in-out forwards;
}
@keyframes sealSpin {
  0%   { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(0) rotate(360deg); opacity: 0; }
}

/* Flap open */
.env-box.open .flap-t {
  transform: rotateX(200deg);
  z-index: 1;
}
/* Card slide up dramatically */
.env-box.open .inner-card {
  transform: translateY(-120%) scale(1.02);
  z-index: 5;
  box-shadow: 0 30px 60px rgba(93,63,155,.4);
}

/* Tap hint */
.tap-hint {
  font-family: Georgia, serif;
  font-size: .74rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: #6d4fa8;
  font-weight: 600;
  text-shadow: 0 1px 4px rgba(255,255,255,.9);
  animation: hint 2.2s infinite ease-in-out;
  z-index: 5;
}
@keyframes hint {
  0%,100% { opacity:.45; transform:scale(1); }
  50%      { opacity:1;   transform:scale(1.04); }
}

/* Light burst on open */
.burst {
  position: absolute;
  top:50%; left:50%;
  width:10px; height:10px;
  border-radius:50%;
  background:rgba(255,240,150,.9);
  transform:translate(-50%,-50%) scale(0);
  z-index: 10;
  pointer-events:none;
  opacity:0;
}
.burst.go {
  animation: burstAnim .7s ease-out forwards;
}
@keyframes burstAnim {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:1; }
  60%  { transform:translate(-50%,-50%) scale(40); opacity:.6; }
  100% { transform:translate(-50%,-50%) scale(80); opacity:0; }
}


/* ================================================================
   GALLERY — 6 portrait screens
================================================================ */
#gallery {
  position: absolute;
  inset: 0;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease;
}
#gallery::-webkit-scrollbar { display:none; }
#gallery.show {
  opacity: 1;
  pointer-events: all;
}

/* Viewport-locked, snap scroll screens with matching cream background color */
.screen {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  background: #f5ecd8;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Custom sage green background for Mehendi & Sangeet (slide 3) to blend seamlessly */
#s3 {
  background: #d4e3cb;
}

/* Complete full screen image cover */
.screen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
}

/* Staggered curtain reveal */
.curtain-container {
  position: absolute;
  inset: 0;
  display: flex;
  z-index: 10;
  pointer-events: none;
}
.curtain {
  flex: 1;
  height: 100%;
  background: #3e040c; /* Crimson envelope color */
  transition: transform 1.4s cubic-bezier(0.25, 1, 0.5, 1);
  transform: translateY(0);
}
.c-left {
  box-shadow: 5px 0 15px rgba(0,0,0,0.4);
  z-index: 1;
}
.c-center {
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
  z-index: 2;
}
.c-right {
  box-shadow: -5px 0 15px rgba(0,0,0,0.4);
  z-index: 1;
}
#gallery.show .c-left {
  transform: translateY(-100%);
  transition-delay: 3.0s;
}
#gallery.show .c-center {
  transform: translateY(100%);
  transition-delay: 3.4s;
}
#gallery.show .c-right {
  transform: translateY(-100%);
  transition-delay: 3.8s;
}

/* ── Dot progress ── */
#dots {
  position: fixed;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  opacity: 0;
  transition: opacity .5s;
}
#dots.show { opacity: 1; }
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  border: 1.5px solid rgba(255,255,255,.4);
  cursor: pointer;
  transition: all .3s;
}
.dot.on {
  background: #aa7c11;
  border-color: #d4af37;
  transform: scale(1.5);
  box-shadow: 0 0 10px rgba(212,175,55,.8);
}

</style>
</head>
<body>

<div id="app">

  <!-- Particle canvas for gold burst -->
  <canvas id="particles"></canvas>

  <!-- ── Envelope Screen ── -->
  <div id="env">
    <!-- Full-screen Crimson & Gold Envelope Image -->
    <img src="assets/envelope_start.jpg?v=5" class="env-bg-img" alt="Wedding Invitation Envelope">
    
    <!-- Transparent click/touch target perfectly aligned with Ganesha wax seal in the center -->
    <div class="seal" id="seal"></div>
  </div>


  <!-- ── Gallery ── -->
  <div id="gallery">

    <div class="screen" id="s1" data-i="0">
      <img src="assets/slide1_married.jpg?v=5" alt="We are getting married" loading="eager">
      <!-- Staggered reveal curtains -->
      <div class="curtain-container">
        <div class="c-left curtain"></div>
        <div class="c-center curtain"></div>
        <div class="c-right curtain"></div>
      </div>
    </div>

    <div class="screen" id="s2" data-i="1">
      <img src="assets/slide2_engagement_haldi.jpg?v=5" alt="Engagement & Haldi" loading="lazy">
    </div>

    <div class="screen" id="s3" data-i="2">
      <img src="assets/slide3_mehendi_sangeet.jpg?v=5" alt="Mehendi & Sangeet" loading="lazy">
    </div>

    <div class="screen" id="s4" data-i="3">
      <img src="assets/slide4_wedding.jpg?v=5" alt="The Wedding" loading="lazy">
    </div>

    <div class="screen" id="s5" data-i="4">
      <img src="assets/slide5_reception.jpg?v=5" alt="Grand Reception" loading="lazy">
    </div>

    <div class="screen" id="s6" data-i="5">
      <img src="assets/slide6_thankyou.jpg?v=5" alt="Thank You" loading="lazy">
    </div>

  </div>

  <!-- Dots -->
  <div id="dots">
    <div class="dot on"  data-go="0"></div>
    <div class="dot"     data-go="1"></div>
    <div class="dot"     data-go="2"></div>
    <div class="dot"     data-go="3"></div>
    <div class="dot"     data-go="4"></div>
    <div class="dot"     data-go="5"></div>
  </div>

</div><!-- /app -->

<script>
/* ── Elements ── */
const envEl    = document.getElementById('env');
const seal     = document.getElementById('seal');
const gallery  = document.getElementById('gallery');
const dotsEl   = document.getElementById('dots');
const canvas   = document.getElementById('particles');
const ctx      = canvas.getContext('2d');
const screens  = Array.from(gallery.querySelectorAll('.screen'));
const dots     = Array.from(dotsEl.querySelectorAll('.dot'));
let opened     = false;

/* ── Particles ── */
canvas.width  = canvas.offsetWidth  || window.innerWidth;
canvas.height = canvas.offsetHeight || window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
});

const particles = [];
let showerEndTime = 0;

function spawnFlowerShower() {
  showerEndTime = Date.now() + 5500; // Flower shower runs for 5.5 seconds
  canvas.style.opacity = 1;
  canvas.style.zIndex = 250;
  animateFlowers();
}

function animateFlowers() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Continuous spawning of petals while active
  if (Date.now() < showerEndTime && Math.random() < 0.4) {
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: -20,
        vy: 1.2 + Math.random() * 1.8,
        r: 6 + Math.random() * 8,
        color: ['#ffb7c5', '#ff9ebb', '#d90429', '#ffd700', '#f72585'][Math.floor(Math.random() * 5)],
        angle: Math.random() * Math.PI * 2,
        rotationSpeed: 0.01 + Math.random() * 0.03,
        sway: Math.random() * 100,
        swaySpeed: 0.02 + Math.random() * 0.03,
        swayAmount: 0.4 + Math.random() * 1.0,
        scaleX: Math.random(),
        isSparkle: false
      });
    }
  }

  // Continuous spawning of gold dust sparkles while active
  if (Date.now() < showerEndTime && Math.random() < 0.45) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -10,
      vy: 1.0 + Math.random() * 1.2,
      r: 1.2 + Math.random() * 1.6,
      color: '#ffd700',
      angle: 0,
      rotationSpeed: 0,
      sway: Math.random() * 100,
      swaySpeed: 0.04,
      swayAmount: 0.25,
      scaleX: 1,
      isSparkle: true
    });
  }

  let alive = false;
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.y += p.vy;
    p.sway += p.swaySpeed;
    p.x += Math.sin(p.sway) * p.swayAmount;
    
    if (!p.isSparkle) {
      p.angle += p.rotationSpeed;
      p.scaleX = Math.sin(p.sway);
    }

    let alpha = 1;
    if (p.y > canvas.height - 120) {
      alpha = Math.max(0, 1 - (p.y - (canvas.height - 120)) / 120);
    }

    if (p.y > canvas.height || alpha <= 0) {
      particles.splice(i, 1);
      continue;
    }

    alive = true;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    if (p.isSparkle) {
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    } else {
      ctx.ellipse(p.x, p.y, p.r * Math.abs(p.scaleX), p.r, p.angle, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.restore();
  }

  if (alive || Date.now() < showerEndTime) {
    requestAnimationFrame(animateFlowers);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.opacity = 0;
  }
}

/* ── Open sequence ── */
function openInvitation() {
  if (opened) return;
  opened = true;

  // 1. Gold Ganesha seal spins and fades out
  seal.classList.add('spinning');

  // 2. Start slow aesthetic flower shower cascading from the top
  spawnFlowerShower();

  // 3. Trigger slow brush diagonal sweep of envelope after seal fade
  setTimeout(() => {
    envEl.classList.add('out');
    gallery.classList.add('show');
    dotsEl.classList.add('show');
    gallery.scrollTop = 0;
  }, 250);

  // 4. Remove envelope after transition completes
  setTimeout(() => { 
    envEl.style.display = 'none'; 
  }, 4200);
}

seal.addEventListener('click', openInvitation);
seal.addEventListener('touchend', e => { e.preventDefault(); openInvitation(); });

/* ── Scroll & Dot Sync ── */
gallery.addEventListener('scroll', () => {
  const scrollTop = gallery.scrollTop;
  const galleryHeight = gallery.clientHeight;
  const scrollCenter = scrollTop + galleryHeight / 2;

  let activeIndex = 0;
  let minDistance = Infinity;

  screens.forEach((s, i) => {
    const screenCenter = s.offsetTop + s.offsetHeight / 2;
    const distance = Math.abs(scrollCenter - screenCenter);
    if (distance < minDistance) {
      minDistance = distance;
      activeIndex = i;
    }
  });

  dots.forEach((d, j) => d.classList.toggle('on', activeIndex === j));
});

dots.forEach((d, i) => {
  d.addEventListener('click', () => {
    screens[i]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});

/* ── Preload ── */
setTimeout(() => {
  ['slide2_engagement_haldi','slide3_mehendi_sangeet','slide4_wedding','slide5_reception','slide6_thankyou']
    .forEach(n => { const img = new Image(); img.src = `assets/${n}.jpg?v=5`; });
}, 800);
</script>

</body>
</html>
