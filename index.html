<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sambit &amp; Akanksha — Wedding Invitation</title>
<style>

/* ── Reset ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html,body {
  width: 100%; height: 100%;
  background: #fdf6ee; /* Warm soft peach/cream backdrop */
  display: flex;
  justify-content: center;
  overflow: hidden;
}

/* Phone shell */
#app {
  position: relative;
  width: 100vw;
  max-width: 430px;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: #fcefe3; /* Peach cream mobile frame */
}

/* ================================================================
   PARTICLES CANVAS (behind everything)
================================================================ */
#particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity .3s;
}
#particles.show { opacity: 1; }

/* ================================================================
   ENVELOPE SCREEN
================================================================ */
#env {
  position: absolute;
  inset: 0;
  background: #fcefe3; /* Seamless peach envelope fallback */
  z-index: 200;
  overflow: hidden;
  perspective: 1000px; /* Enable 3D transitions */
}

/* Split layers using the same image via clip-path */
#env-lower {
  position: absolute;
  inset: 0;
  background: url('assets/envelope_start.jpg?v=3') no-repeat center center;
  background-size: cover;
  clip-path: polygon(0% 55%, 50% 73.5%, 100% 55%, 100% 100%, 0% 100%);
  z-index: 1;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: auto;
}

#env-upper {
  position: absolute;
  inset: 0;
  background: url('assets/envelope_start.jpg?v=3') no-repeat center center;
  background-size: cover;
  clip-path: polygon(0% 0%, 100% 0%, 100% 55%, 50% 73.5%, 0% 55%);
  z-index: 2;
  transform-origin: top center;
  transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
  image-rendering: -webkit-optimize-contrast;
  image-rendering: auto;
}

/* Upper leaflet flap folds upwards cleanly */
#env-upper.open {
  transform: translateY(-100%) rotateX(45deg);
}

/* Premium gold breathing glow click target exactly aligned with Ganesha wax seal */
.seal {
  position: absolute;
  top: 73.5%; /* Aligned with Ganesha wax seal in the new peach starting envelope */
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 10;
  -webkit-user-select: none;
  user-select: none;
  
  /* Bright, premium gold glowing border and box shadow */
  border: 2px solid rgba(212, 175, 55, 0.95);
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.8),
              inset 0 0 10px rgba(212, 175, 55, 0.4);
  animation: sealGlowPulse 2.0s infinite ease-in-out;
}
@keyframes sealGlowPulse {
  0% {
    box-shadow: 0 0 8px rgba(212, 175, 55, 0.6), 
                inset 0 0 5px rgba(212, 175, 55, 0.3);
    transform: translate(-50%, -50%) scale(1);
  }
  50% {
    box-shadow: 0 0 30px rgba(212, 175, 55, 1), 
                0 0 45px rgba(212, 175, 55, 0.7),
                inset 0 0 15px rgba(212, 175, 55, 0.6);
    transform: translate(-50%, -50%) scale(1.06); /* Rhythmic breathing scale */
  }
  100% {
    box-shadow: 0 0 8px rgba(212, 175, 55, 0.6), 
                inset 0 0 5px rgba(212, 175, 55, 0.3);
    transform: translate(-50%, -50%) scale(1);
  }
}

/* Seal click spinning effect */
.seal.spinning {
  animation: sealSpin 0.5s ease-in-out forwards;
}
@keyframes sealSpin {
  0%   { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0) rotate(360deg); opacity: 0; }
}

/* White flash transition screen */
#white-flash {
  position: absolute;
  inset: 0;
  background: #ffffff;
  z-index: 250; /* Sits on top of envelope and gallery */
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}
#white-flash.show {
  opacity: 1;
}


/* ================================================================
   GALLERY — 6 portrait screens
================================================================ */
#gallery {
  position: absolute;
  inset: 0;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  opacity: 0;
  pointer-events: none;
}
#gallery::-webkit-scrollbar { display:none; }
#gallery.show {
  opacity: 1;
  pointer-events: all;
}

/* Viewport-locked, snap scroll screens with matching cream background color */
.screen {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  background: #fcefe3; /* Seamless peach slide fallback */
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Complete full screen image cover optimized for extreme sharpness & 8K text clarity */
.screen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
  
  /* Safari/Chrome image scaling contrast optimizations for high-res details */
  image-rendering: -webkit-optimize-contrast;
  image-rendering: auto;
  
  /* Force hardware compositing to keep text crystal clear */
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

/* ── Dot progress ── */
#dots {
  position: fixed;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  opacity: 0;
  transition: opacity .5s;
}
#dots.show { opacity: 1; }
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  border: 1.5px solid rgba(255,255,255,.4);
  cursor: pointer;
  transition: all .3s;
}
.dot.on {
  background: #aa7c11;
  border-color: #d4af37;
  transform: scale(1.5);
  box-shadow: 0 0 10px rgba(212,175,55,.8);
}

</style>
</head>
<body>

<div id="app">

  <!-- Particle canvas for gold burst -->
  <canvas id="particles"></canvas>

  <!-- ── Envelope Screen ── -->
  <div id="env">
    <!-- Split layers using the same image via clip-path -->
    <div id="env-lower"></div>
    <div id="env-upper"></div>
    <!-- Transparent click/touch target perfectly aligned with Ganesha wax seal in the center -->
    <div class="seal" id="seal"></div>
  </div>

  <!-- White flash transition screen -->
  <div id="white-flash"></div>


  <!-- ── Gallery ── -->
  <div id="gallery">

    <div class="screen" id="s1" data-i="0">
      <img src="assets/slide1_intro.jpg?v=3" alt="Akanksha & Sambit Introduction Card" loading="eager">
    </div>

    <div class="screen" id="s2" data-i="1">
      <img src="assets/slide2_engagement.jpg?v=3" alt="Engagement Scroll Card" loading="lazy">
    </div>

    <div class="screen" id="s3" data-i="2">
      <img src="assets/slide3_haldi.jpg?v=3" alt="Haldi Scroll Card" loading="lazy">
    </div>

    <div class="screen" id="s4" data-i="3">
      <img src="assets/slide4_mehendi_sangeet.jpg?v=3" alt="Mehendi & Sangeet Scroll Card" loading="lazy">
    </div>

    <div class="screen" id="s5" data-i="4">
      <img src="assets/slide5_wedding.jpg?v=3" alt="Wedding Scroll Card" loading="lazy">
    </div>

    <div class="screen" id="s6" data-i="5">
      <img src="assets/slide6_reception.jpg?v=3" alt="Reception Scroll Card" loading="lazy">
    </div>

  </div>

  <!-- Dots -->
  <div id="dots">
    <div class="dot on"  data-go="0"></div>
    <div class="dot"     data-go="1"></div>
    <div class="dot"     data-go="2"></div>
    <div class="dot"     data-go="3"></div>
    <div class="dot"     data-go="4"></div>
    <div class="dot"     data-go="5"></div>
  </div>

</div><!-- /app -->

<script>
/* ── Elements ── */
const envEl    = document.getElementById('env');
const seal     = document.getElementById('seal');
const gallery  = document.getElementById('gallery');
const dotsEl   = document.getElementById('dots');
const canvas   = document.getElementById('particles');
const ctx      = canvas.getContext('2d');
const screens  = Array.from(gallery.querySelectorAll('.screen'));
const dots     = Array.from(dotsEl.querySelectorAll('.dot'));
let opened     = false;

/* ── Particles (Inert) ── */
canvas.width  = canvas.offsetWidth  || window.innerWidth;
canvas.height = canvas.offsetHeight || window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
});

/* ── Open sequence ── */
function openInvitation() {
  if (opened) return;
  opened = true;

  // 1. Gold Ganesha seal spins and fades out
  seal.classList.add('spinning');

  // 2. Animate the upper leaflet/flap folding up
  const envUpper = document.getElementById('env-upper');
  envUpper.classList.add('open');

  // 3. Trigger white flash transition as the flap opens (at 600ms)
  const flash = document.getElementById('white-flash');
  setTimeout(() => {
    flash.classList.add('show');
  }, 600);

  // 4. Fully load the first gallery screen under the white screen (at 1400ms)
  setTimeout(() => {
    envEl.style.display = 'none';
    gallery.classList.add('show');
    dotsEl.classList.add('show');
    gallery.scrollTop = 0;
  }, 1400);

  // 5. Fade out the white screen to reveal the first slide in high clarity (at 1500ms)
  setTimeout(() => {
    flash.classList.remove('show');
  }, 1500);
}

seal.addEventListener('click', openInvitation);
seal.addEventListener('touchend', e => { e.preventDefault(); openInvitation(); });

/* ── Scroll & Dot Sync ── */
gallery.addEventListener('scroll', () => {
  const scrollTop = gallery.scrollTop;
  const galleryHeight = gallery.clientHeight;
  const scrollCenter = scrollTop + galleryHeight / 2;

  let activeIndex = 0;
  let minDistance = Infinity;

  screens.forEach((s, i) => {
    const screenCenter = s.offsetTop + s.offsetHeight / 2;
    const distance = Math.abs(scrollCenter - screenCenter);
    if (distance < minDistance) {
      minDistance = distance;
      activeIndex = i;
    }
  });

  dots.forEach((d, j) => d.classList.toggle('on', activeIndex === j));
});

dots.forEach((d, i) => {
  d.addEventListener('click', () => {
    screens[i]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});

/* ── Preload ── */
setTimeout(() => {
  ['slide2_engagement','slide3_haldi','slide4_mehendi_sangeet','slide5_wedding','slide6_reception']
    .forEach(n => { const img = new Image(); img.src = `assets/${n}.jpg?v=3`; });
}, 800);
</script>

</body>
</html>
